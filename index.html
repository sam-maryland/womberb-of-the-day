<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Womberb of the Day</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #f7f6f2;
      color: #1c1c1c;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 680px;
      width: 100%;
      text-align: center;
    }

    .label {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 3rem;
    }

    blockquote {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-style: italic;
      line-height: 1.65;
      color: #1c1c1c;
      margin: 0 0 2rem;
    }

    .attribution {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.8rem;
      color: #999;
      letter-spacing: 0.04em;
      margin-bottom: 2.5rem;
    }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45em;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      background: none;
      border: 1px solid #ddd;
      border-radius: 2rem;
      padding: 0.5em 1.2em;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .share-btn:hover {
      color: #666;
      border-color: #bbb;
    }

    .share-btn.confirmed {
      color: #7a9e7a;
      border-color: #b5d0b5;
    }

    .share-btn svg {
      flex-shrink: 0;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.7rem;
      color: #ccc;
      letter-spacing: 0.05em;
    }

    .wombo {
      position: relative;
      display: inline-block;
      text-decoration: underline dotted #999;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 3px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .wombo.active {
      text-decoration-style: solid;
      text-decoration-color: #1c1c1c;
    }

    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.09);
      padding: 0.85rem 1rem;
      text-align: left;
      font-style: normal;
      z-index: 100;
      pointer-events: none;
    }

    .wombo.active .tooltip {
      display: block;
    }

    .tooltip::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: calc(50% + var(--caret-offset, 0px));
      margin-left: -5px;
      width: 9px;
      height: 9px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      border-bottom: 1px solid #e0e0e0;
      transform: rotate(45deg);
    }

    .tooltip-label {
      display: block;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 0.45rem;
    }

    .tooltip-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .pill {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.65rem;
      color: #666;
      background: #f7f6f2;
      border: 1px solid #e0e0e0;
      border-radius: 999px;
      padding: 0.15em 0.6em;
    }

    .tooltip-divider {
      display: block;
      height: 1px;
      background: #ebebeb;
      margin: 0.7rem 0;
    }

    .tooltip-def {
      display: block;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.72rem;
      font-style: italic;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="label">Womberb of the Day</p>
    <blockquote id="sentence">&#8230;</blockquote>
    <p class="attribution">&#8212;&thinsp;Ancient Womberb</p>
    <button class="share-btn" id="share-btn" onclick="share()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
      <span id="share-label">Share</span>
    </button>
  </div>

  <footer id="date"></footer>

  <script>
    let currentSentence = "Stay lowkenuine, and the rizzdom will follow.";

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function buildWomboSpan(text, w) {
      const pills = w.components.map(c => `<span class="pill">${escapeHtml(c)}</span>`).join('');
      return (
        `<span class="wombo">` +
          escapeHtml(text) +
          `<span class="tooltip">` +
            `<span class="tooltip-label">Wombination</span>` +
            `<span class="tooltip-pills">${pills}</span>` +
            `<span class="tooltip-divider"></span>` +
            `<span class="tooltip-label">Wombinition</span>` +
            `<span class="tooltip-def">${escapeHtml(w.definition)}</span>` +
          `</span>` +
        `</span>`
      );
    }

    function highlightWombos(sentence, wombos) {
      const sorted = [...wombos].sort((a, b) => b.word.length - a.word.length);
      const womboMap = Object.fromEntries(wombos.map(w => [w.word.toLowerCase(), w]));
      const patterns = sorted.map(w =>
        w.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/\s+/g, '\\s+')
      );
      const regex = new RegExp(`\\b(${patterns.join('|')})\\b`, 'gi');
      const parts = [];
      let last = 0, m;
      while ((m = regex.exec(sentence)) !== null) {
        if (m.index > last) parts.push(escapeHtml(sentence.slice(last, m.index)));
        const w = womboMap[m[0].toLowerCase()];
        parts.push(w ? buildWomboSpan(m[0], w) : escapeHtml(m[0]));
        last = m.index + m[0].length;
      }
      if (last < sentence.length) parts.push(escapeHtml(sentence.slice(last)));
      return parts.join('');
    }

    function resetTooltip(w) {
      const t = w.querySelector('.tooltip');
      t.style.transform = '';
      t.style.removeProperty('--caret-offset');
    }

    function repositionTooltip(w) {
      const t = w.querySelector('.tooltip');
      const rect = t.getBoundingClientRect();
      const margin = 12;
      if (rect.left < margin) {
        const shift = margin - rect.left;
        t.style.transform = `translateX(calc(-50% + ${shift}px))`;
        t.style.setProperty('--caret-offset', `-${shift}px`);
      } else if (rect.right > window.innerWidth - margin) {
        const shift = rect.right - (window.innerWidth - margin);
        t.style.transform = `translateX(calc(-50% - ${shift}px))`;
        t.style.setProperty('--caret-offset', `${shift}px`);
      }
    }

    function initWombos() {
      const wombos = document.querySelectorAll('.wombo');
      wombos.forEach(w => {
        w.addEventListener('click', e => {
          e.stopPropagation();
          const isActive = w.classList.contains('active');
          wombos.forEach(other => { other.classList.remove('active'); resetTooltip(other); });
          if (!isActive) {
            w.classList.add('active');
            repositionTooltip(w);
          }
        });
      });
      document.addEventListener('click', () => {
        wombos.forEach(w => { w.classList.remove('active'); resetTooltip(w); });
      });
    }

    Promise.all([
      fetch('./daily.json').then(r => r.json()),
      fetch('./wombos.json').then(r => r.json())
    ]).then(([daily, wombos]) => {
      currentSentence = daily.sentence;
      document.getElementById('sentence').innerHTML = highlightWombos(daily.sentence, wombos);
      document.getElementById('date').textContent = daily.date;
      initWombos();
    }).catch(() => {
      document.getElementById('sentence').textContent = currentSentence;
    });

    function buildShareText() {
      return `Womberb of the Day\n\n"${currentSentence}"\n\nwomberb.com`;
    }

    function share() {
      const text = buildShareText();
      const btn = document.getElementById("share-btn");
      const label = document.getElementById("share-label");

      if (navigator.share) {
        navigator.share({ text }).catch(() => {});
        return;
      }

      navigator.clipboard.writeText(text).then(() => {
        label.textContent = "Copied!";
        btn.classList.add("confirmed");
        setTimeout(() => {
          label.textContent = "Share";
          btn.classList.remove("confirmed");
        }, 2000);
      });
    }
  </script>
</body>
</html>
