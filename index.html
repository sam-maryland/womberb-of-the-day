<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wombo of the Day</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #f7f6f2;
      color: #1c1c1c;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 680px;
      width: 100%;
      text-align: center;
    }

    .label {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 3rem;
    }

    blockquote {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-style: italic;
      line-height: 1.65;
      color: #1c1c1c;
      margin: 0 0 2rem;
    }

    .attribution {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.8rem;
      color: #999;
      letter-spacing: 0.04em;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.7rem;
      color: #ccc;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="label">Wombo of the Day</p>
    <blockquote id="sentence">&#8230;</blockquote>
    <p class="attribution">&#8212;&thinsp;Ancient Womberb</p>
  </div>

  <footer id="date"></footer>

  <script>
    fetch("./daily.json")
      .then((r) => r.json())
      .then((data) => {
        document.getElementById("sentence").textContent = data.sentence;
        document.getElementById("date").textContent = data.date;
      })
      .catch(() => {
        document.getElementById("sentence").textContent =
          "Stay lowkenuine, and the rizzdom will follow.";
      });
  </script>
</body>
</html>
